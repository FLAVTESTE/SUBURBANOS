const generateSales = () => {
  const REF = new Date("2025-02-18");
  const DAYS = 365;
  const WF = [1.30, 0.55, 0.62, 0.70, 0.88, 1.52, 1.78];
  const MF = [1.10, 1.18, 0.96, 0.92, 0.90, 0.88, 0.95, 0.93, 0.98, 1.02, 1.08, 1.22];
  const CAT_MF = {
    "Bebidas":             [1.15,1.20,1.00,0.95,0.90,0.85,0.90,0.92,0.96,1.00,1.05,1.18],
    "Sobremesas":          [1.05,1.08,1.00,0.98,0.96,0.94,0.97,0.96,0.98,1.00,1.02,1.10],
    "Pizzas Tradicionais": [1.05,1.10,0.98,0.96,0.95,0.94,0.97,0.95,0.98,1.00,1.03,1.12],
    "Pizzas Especiais":    [1.02,1.05,0.99,0.98,0.97,0.96,0.97,0.97,0.99,1.00,1.02,1.06],
    "Bordas Recheadas":    [1.05,1.08,1.00,0.98,0.96,0.95,0.97,0.96,0.99,1.00,1.03,1.10],
  };
  const SAZONAL = [1.00,1.05,0.95,0.92,0.90,0.88,0.90,0.89,0.93,0.97,1.00,1.04];
  const rows = [];
  RAW_PRODUCTS.forEach(p => {
    for (let d = DAYS - 1; d >= 0; d--) {
      const dt = new Date(REF);
      dt.setDate(dt.getDate() - d);
      const ds = dt.toISOString().slice(0, 10);
      const dow = dt.getDay();
      const mon = dt.getMonth();
      const wf = WF[dow];
      const mf = MF[mon];
      const catMf = (CAT_MF[p.cat] || [])[mon] ?? 1.0;
      const sazonalBonus = p.role === "Sazonal" ? SAZONAL[mon] : 1.0;
      const noise = Math.sin(p.id * 61.3 + d * 23.1) * 0.5 + 0.5;
      const ageDays = DAYS - 1 - d;
      const trend = p.baseVol > 1 ? 1 + ageDays * 0.00019 : 1 - ageDays * 0.00006;
      const qty = Math.max(0, Math.round(p.baseVol * wf * mf * catMf * sazonalBonus * (0.70 + noise * 0.60) * trend));
      if (qty > 0) rows.push({ pid: p.id, qty, date: ds });
    }
  });
  return rows;
};

const ALL_SALES = generateSales();

const buildProductMetrics = () => {
  const LAST90 = "2024-11-20";
  const WOW_L7 = "2025-02-12";
  const WOW_P7S = "2025-02-05";
  const WOW_P7E = "2025-02-12";
  const LAST14 = "2025-02-05";
  const metrics = RAW_PRODUCTS.map(p => {
    const rows = ALL_SALES.filter(s => s.pid === p.id);
    const rows90 = rows.filter(s => s.date >= LAST90);
    const qty90 = rows90.reduce((a, s) => a + s.qty, 0);
    const rev90 = qty90 * p.price;
    const gp90 = qty90 * (p.price - p.vc);
    const grossMar = p.price > 0 ? ((p.price - p.vc) / p.price) * 100 : 0;
    const l7 = rows.filter(s => s.date >= WOW_L7).reduce((a, s) => a + s.qty, 0);
    const p7 = rows.filter(s => s.date >= WOW_P7S && s.date < WOW_P7E).reduce((a, s) => a + s.qty, 0);
    const wow = p7 > 0 ? ((l7 - p7) / p7) * 100 : 0;
    const last14rows = rows.filter(s => s.date >= LAST14);
    const avgDay = last14rows.length > 0 ? last14rows.reduce((a, s) => a + s.qty, 0) / 14 : 0;
    const stdDev = last14rows.length > 0
      ? Math.sqrt(last14rows.reduce((a, s) => a + Math.pow(s.qty - avgDay, 2), 0) / 14) : 0;
    return { ...p, qty90, rev90, gp90, grossMar, wow, avgDailyQty: avgDay, stdDev, l7, p7 };
  });
  const totalRev90 = metrics.reduce((a, p) => a + p.rev90, 0);
  return metrics.map(p => ({ ...p, revShare: totalRev90 > 0 ? p.rev90 / totalRev90 : 0, totalRev90 }));
};

const PRODUCT_METRICS = buildProductMetrics();

const buildDailyAgg = () => {
  const m = {};
  ALL_SALES.forEach(({ date, qty, pid }) => {
    const p = RAW_PRODUCTS.find(x => x.id === pid);
    if (!p) return;
    if (!m[date]) m[date] = { date, revenue: 0, grossProfit: 0, orders: 0 };
    m[date].revenue += qty * p.price;
    m[date].grossProfit += qty * (p.price - p.vc);
    m[date].orders += qty;
  });
  return Object.values(m).sort((a, b) => a.date.localeCompare(b.date));
};

const DAILY_AGG = buildDailyAgg();

const calcDailyAgg = (overrides = {}) => {
  if (!overrides || Object.keys(overrides).length === 0) return DAILY_AGG;
  const m = {};
  ALL_SALES.forEach(({ date, qty, pid }) => {
    const raw = RAW_PRODUCTS.find(x => x.id === pid);
    if (!raw) return;
    const ov = overrides[pid] || {};
    const price = (typeof ov.price === "number" && ov.price > 0) ? ov.price : raw.price;
    const vc = (typeof ov.vc === "number" && ov.vc >= 0) ? ov.vc : raw.vc;
    if (!m[date]) m[date] = { date, revenue: 0, grossProfit: 0, orders: 0 };
    m[date].revenue += qty * price;
    m[date].grossProfit += qty * (price - vc);
    m[date].orders += qty;
  });
  return Object.values(m).sort((a, b) => a.date.localeCompare(b.date));
};

const calcProductMetrics = (overrides = {}) => {
  const hasCustom = overrides && Object.values(overrides).some(o => o?._custom);
  let metrics = RAW_PRODUCTS.map(p => {
    const ov = overrides[p.id] || {};
    if (ov._custom || ov._removed) return null;
    const price = (typeof ov.price === "number" && ov.price > 0) ? ov.price : p.price;
    const vc = (typeof ov.vc === "number" && ov.vc >= 0) ? ov.vc : p.vc;
    const cat = (typeof ov.cat === "string" && ov.cat) ? ov.cat : p.cat;
    const role = (typeof ov.role === "string" && ov.role) ? ov.role : p.role;
    const rows = ALL_SALES.filter(s => s.pid === p.id);
    const qty90 = rows.reduce((a, s) => a + s.qty, 0);
    const rev90 = qty90 * price;
    const gp90 = qty90 * (price - vc);
    const grossMar = price > 0 ? ((price - vc) / price) * 100 : 0;
    const base = PRODUCT_METRICS.find(x => x.id === p.id) || {};
    return { ...base, price, vc, cat, role, rev90, gp90, grossMar, qty90 };
  }).filter(Boolean);

  if (hasCustom) {
    Object.entries(overrides).forEach(([idStr, ov]) => {
      if (!ov?._custom || ov._removed) return;
      const id = parseInt(idStr);
      const { name, cat, price, vc, role, rating = 4.5, nRat = 0 } = ov;
      const catProds = PRODUCT_METRICS.filter(p => p.cat === cat);
      const avgCatQty = catProds.length > 0
        ? catProds.reduce((a, p) => a + p.qty90, 0) / catProds.length * 0.6 : 20;
      const qty90 = Math.round(avgCatQty);
      const rev90 = qty90 * price;
      const gp90 = qty90 * (price - vc);
      const grossMar = price > 0 ? ((price - vc) / price) * 100 : 0;
      metrics.push({
        id, name, cat, price, vc, role, rating, nRat,
        baseVol: Math.round(avgCatQty / 90),
        qty90, rev90, gp90, grossMar,
        wow: 0, avgDailyQty: qty90 / 90, stdDev: 0, l7: 0, p7: 0,
        revShare: 0, totalRev90: 0, _custom: true,
      });
    });
  }

  const totalRev90 = metrics.reduce((a, p) => a + p.rev90, 0);
  return metrics.map(p => ({ ...p, revShare: totalRev90 > 0 ? p.rev90 / totalRev90 : 0, totalRev90 }));
};

const calcFinancials = (costs, overrides = {}) => {
  const totalFixed = Object.values(costs).reduce((a, b) => a + b, 0);
  const dayAgg = calcDailyAgg(overrides);
  const prodMets = calcProductMetrics(overrides);
  const slice30 = dayAgg.slice(-30);
  const totalRev30 = slice30.reduce((a, d) => a + d.revenue, 0);
  const totalGP30 = slice30.reduce((a, d) => a + d.grossProfit, 0);
  const netProfit30 = totalGP30 - totalFixed;
  const netMar30 = totalRev30 > 0 ? (netProfit30 / totalRev30) * 100 : 0;
  const grossMar30 = totalRev30 > 0 ? (totalGP30 / totalRev30) * 100 : 0;
  const breakeven = totalGP30 > 0 ? (totalFixed / totalGP30) * totalRev30 : 0;
  const ordersTotal = slice30.reduce((a, d) => a + d.orders, 0);
  const avgTicketVal = ordersTotal > 0 ? totalRev30 / ordersTotal : 0;
  const products = prodMets.map(p => {
    const fixedAlloc90 = totalFixed * 3 * p.revShare;
    const fixedPerUnit = p.qty90 > 0 ? fixedAlloc90 / p.qty90 : 0;
    const totalCostUnit = p.vc + fixedPerUnit;
    const netMarUnit = p.price - totalCostUnit;
    const netMar = p.price > 0 ? (netMarUnit / p.price) * 100 : 0;
    return { ...p, fixedPerUnit, totalCostUnit, netMar, netProfit90: p.qty90 * netMarUnit };
  });
  const avgNetMar = products.reduce((a, p) => a + p.netMar, 0) / products.length;
  const avgGrossMar = products.reduce((a, p) => a + p.grossMar, 0) / products.length;
  const avgVol = products.reduce((a, p) => a + p.qty90, 0) / products.length;
  return {
    totalFixed, totalRev30, totalGP30, netProfit30, netMar30,
    grossMar30, breakeven, avgTicketVal, products,
    avgNetMar, avgGrossMar, avgVol, dayAgg,
  };
};

const calcHealthScore = (p, avgNetMar, avgVol) => {
  const marScore = Math.min(40, Math.max(0, (p.netMar / 35) * 40));
  const volScore = Math.min(25, Math.max(0, (p.qty90 / (avgVol * 1.5)) * 25));
  const trendScore = Math.min(15, Math.max(0, 7.5 + p.wow * 0.25));
  const ratingScore = Math.min(12, Math.max(0, (p.rating - 3) / 2 * 12));
  const consistScore = p.stdDev < p.avgDailyQty * 0.3 ? 8 : p.stdDev < p.avgDailyQty * 0.6 ? 4 : 0;
  return Math.round(marScore + volScore + trendScore + ratingScore + consistScore);
};

const getQuadrant = (netMar, qty, avgNM, avgVol) => {
  if (netMar >= avgNM && qty >= avgVol) return { label: "Estrela",      color: "#C8A84A" };
  if (netMar >= avgNM && qty <  avgVol) return { label: "Oportunidade", color: "#4A8B5E" };
  if (netMar <  avgNM && qty >= avgVol) return { label: "Popular",      color: "#C07838" };
  return { label: "Problema", color: "#B03C3C" };
};

const detectAnomalies = (products) => {
  return products
    .filter(p => Math.abs(p.wow) > 20 || p.stdDev > p.avgDailyQty * 0.7)
    .map(p => ({
      pid: p.id, name: p.name, wow: p.wow, stdDev: p.stdDev,
      type: p.wow < -20 ? "queda" : p.wow > 25 ? "crescimento" : "volatilidade",
    }));
};

const calcConcentration = (products) => {
  const sorted = [...products].sort((a, b) => b.rev90 - a.rev90);
  const top3Rev = sorted.slice(0, 3).reduce((a, p) => a + p.rev90, 0);
  const totalRev = sorted.reduce((a, p) => a + p.rev90, 0);
  return { top3Pct: totalRev > 0 ? (top3Rev / totalRev) * 100 : 0, top3: sorted.slice(0, 3) };
};

const calcPositioning = (fin) => {
  const avgPrice = PRODUCT_METRICS.reduce((a, p) => a + p.price * p.revShare, 0);
  const premiumPct = fin.products.filter(p => p.price >= 80).reduce((a, p) => a + p.revShare, 0) * 100;
  const type = premiumPct > 50 ? "Premium" : premiumPct > 20 ? "Equilíbrio" : "Volume";
  return { avgPrice, premiumPct, type, coherent: true };
};

const calcWeekPriorities = (fin) => {
  const priorities = [];
  const priColors = { critical: "#D45050", warning: "#D08040", success: "#58B868", info: "#5090C8" };
  const neg = fin.products.filter(p => p.netMar < 0);
  if (neg.length > 0) priorities.push({ icon: "⚠", level: "critical", text: `${neg.map(p => p.name).join(", ")} operam com margem líquida negativa.` });
  detectAnomalies(fin.products).filter(a => a.type === "queda").slice(0, 2).forEach(a => {
    priorities.push({ icon: "▼", level: "warning", text: `${a.name} caiu ${Math.abs(a.wow).toFixed(0)}% esta semana.` });
  });
  const { top3Pct, top3 } = calcConcentration(fin.products);
  if (top3Pct > 55) priorities.push({ icon: "◎", level: "info", text: `${top3Pct.toFixed(0)}% da receita em ${top3.map(p => p.name).join(", ")}.` });
  detectAnomalies(fin.products).filter(a => a.type === "crescimento").slice(0, 1).forEach(a => {
    priorities.push({ icon: "▲", level: "success", text: `${a.name} cresceu ${a.wow.toFixed(0)}% na semana.` });
  });
  if (fin.netMar30 < 8) priorities.push({ icon: "⚠", level: "critical", text: `Margem líquida em ${fin.netMar30.toFixed(1)}% — abaixo do mínimo de 8%.` });
  return priorities.slice(0, 6);
};

const simulatePrice = (product, newPrice, fin) => {
  if (!product || newPrice <= 0) return null;
  const ELAST = { "Bebidas": -0.38, "Bordas Recheadas": -0.30, "Sobremesas": -0.52, "Pizzas Tradicionais": -0.80, "Pizzas Especiais": -0.65 };
  const ROLE_MULT = { "Premium": 0.58, "Diferencial": 0.65, "Carro-chefe": 0.78, "Volume": 1.28, "Complemento": 1.10, "Sazonal": 1.05 };
  const DZ = { "Bebidas": 0.065, "Bordas Recheadas": 0.080, "Sobremesas": 0.060, "Pizzas Tradicionais": 0.048, "Pizzas Especiais": 0.052 };
  const elastFinal = (ELAST[product.cat] ?? -0.72) * (ROLE_MULT[product.role] ?? 1.0);
  const deadZone = DZ[product.cat] ?? 0.055;
  const pctChange = (newPrice - product.price) / product.price;
  const inDeadZone = Math.abs(pctChange) <= deadZone;
  const newGrossMar = newPrice > 0 ? ((newPrice - product.vc) / newPrice) * 100 : 0;
  const newNetMar = newPrice > 0 ? ((newPrice - product.vc - (product.fixedPerUnit || 0)) / newPrice) * 100 : 0;
  const oldRev = product.qty90 * product.price;
  const oldGP = product.qty90 * (product.price - product.vc);
  const SMULT = { pessimista: 1.40, base: 1.00, otimista: 0.65 };
  const scenarios = {};
  Object.entries(SMULT).forEach(([scen, smult]) => {
    let vol = product.qty90;
    if (!inDeadZone) {
      const sign = pctChange > 0 ? 1 : -1;
      const excess = sign * (Math.abs(pctChange) - deadZone);
      const elastEff = elastFinal * smult;
      if (pctChange > 0) {
        const d = Math.tanh(Math.abs(excess) * 4.5) * Math.abs(excess);
        vol = Math.max(0, Math.round(product.qty90 * (1 + elastEff * d)));
      } else {
        const d = Math.tanh(Math.abs(excess) * 3.5) * Math.abs(excess);
        vol = Math.max(0, Math.round(product.qty90 * Math.min(1 - elastEff * d, 1.40)));
      }
    }
    const rev = vol * newPrice;
    const newGP = vol * (newPrice - product.vc);
    scenarios[scen] = { volImpact: vol, newRev: rev, revDelta: rev - oldRev, newGP, gpDelta: newGP - oldGP };
  });
  return { newPrice, newGrossMar, newNetMar, pctChange, inDeadZone, deadZone, elastBase: elastFinal, oldRev, oldGP, scenarios, volImpact: scenarios.base.volImpact, revDelta: scenarios.base.revDelta, newRev: scenarios.base.newRev };
};

═══════════════════════════════════════ */
const STORAGE_KEY = "SUBURBANOS_v1";
const STRATEGIC_PARAMS_DEFAULT = { minMargin: 8, targetMargin: 18, targetOpProfit: 12000, targetTicket: 35, maxCostPct: 55, alertSensitivity: "normal" };

const persistState = (state) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ _v: 1, ...state })); } catch (_) {} };
const loadPersistedState = () => { try { const r = localStorage.getItem(STORAGE_KEY); if (!r) return null; const p = JSON.parse(r); return p?._v === 1 ? p : null; } catch { return null; } };
const clearPersistedState = () => { try { localStorage.removeItem(STORAGE_KEY); } catch (_) {} };

const getInitialState = () => {
  const saved = loadPersistedState();
  if (!saved) return { costs: COSTS_DEFAULT, costLog: [{ date: "18/02/2025 09:00", costs: { ...COSTS_DEFAULT }, note: "Configuração inicial", impact: null }], productOverrides: {}, productHistory: {}, strategicParams: { ...STRATEGIC_PARAMS_DEFAULT } };
  return { costs: saved.costs || COSTS_DEFAULT, costLog: saved.costLog || [], productOverrides: saved.productOverrides || {}, productHistory: saved.productHistory || {}, strategicParams: saved.strategicParams || { ...STRATEGIC_PARAMS_DEFAULT } };
};

/* ═══════════════════════════════════════
   CONTEXT
═══════════════════════════════════════ */
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

const nowStr = () => new Date().toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
const todayStr = () => new Date().toLocaleDateString("pt-BR");

function AppProvider({ children }) {
  const [init] = useState(() => getInitialState());
  const [costs, setCosts] = useState(init.costs);
  const [costLog, setCostLog] = useState(init.costLog);
  const [costAlert, setCostAlert] = useState(null);
  const [strategicParams, setStrategicParams] = useState(init.strategicParams || STRATEGIC_PARAMS_DEFAULT);
  const [productOverrides, setProductOverrides] = useState(init.productOverrides);
  const [productHistory, setProductHistory] = useState(init.productHistory);
  const [updateFeedback, setUpdateFeedback] = useState(null);

  const fin = useMemo(() => calcFinancials(costs, productOverrides), [costs, productOverrides]);
  const persistTimerRef = useRef(null);
  const strategicParamsRef = useRef(strategicParams);
  useEffect(() => { strategicParamsRef.current = strategicParams; }, [strategicParams]);

  const schedulePersist = useCallback((nc, nl, no, nh, nsp) => {
    if (persistTimerRef.current) clearTimeout(persistTimerRef.current);
    persistTimerRef.current = setTimeout(() => {
      persistState({ costs: nc, costLog: nl, productOverrides: no, productHistory: nh, strategicParams: nsp !== undefined ? nsp : strategicParamsRef.current });
    }, 250);
  }, []);

  useEffect(() => { schedulePersist(costs, costLog, productOverrides, productHistory); }, [costs, costLog, productOverrides, productHistory, schedulePersist]);

  const updateCosts = useCallback((newCosts, note = "Atualização manual") => {
    const prevFin = calcFinancials(costs, productOverrides);
    const nextFin = calcFinancials(newCosts, productOverrides);
    const impact = { marDelta: nextFin.netMar30 - prevFin.netMar30, profDelta: nextFin.netProfit30 - prevFin.netProfit30, prevMar: prevFin.netMar30, nextMar: nextFin.netMar30, prevProf: prevFin.netProfit30, nextProf: nextFin.netProfit30 };
    const newLog = [{ date: nowStr(), costs: { ...newCosts }, note, impact }, ...costLog];
    setCosts(newCosts); setCostLog(newLog);
    if (Math.abs(impact.marDelta) >= 0.3) setCostAlert(impact);
    schedulePersist(newCosts, newLog, productOverrides, productHistory);
  }, [costs, costLog, productOverrides, productHistory, schedulePersist]);

  const clearCostAlert = useCallback(() => setCostAlert(null), []);

  const updateProduct = useCallback((pid, changes, note = "Edição manual") => {
    const rawP = RAW_PRODUCTS.find(p => p.id === pid);
    const prevOv = productOverrides[pid] || {};
    const isCustom = !!prevOv._custom;
    if (!rawP && !isCustom) return;
    const prevPrice = prevOv.price ?? rawP?.price ?? 0;
    const prevVc = prevOv.vc ?? rawP?.vc ?? 0;
    const effectiveOv = { ...prevOv };
    if (typeof changes.price === "number" && changes.price > 0) effectiveOv.price = changes.price;
    if (typeof changes.vc === "number" && changes.vc >= 0) effectiveOv.vc = changes.vc;
    if (typeof changes.cat === "string" && changes.cat) effectiveOv.cat = changes.cat;
    if (typeof changes.role === "string" && changes.role) effectiveOv.role = changes.role;
    if (changes._removed === true) effectiveOv._removed = true;
    if (changes._active === true) delete effectiveOv._removed;
    if (!isCustom && rawP) {
      if (effectiveOv.price === rawP.price) delete effectiveOv.price;
      if (effectiveOv.vc === rawP.vc) delete effectiveOv.vc;
      if (effectiveOv.cat === rawP.cat) delete effectiveOv.cat;
      if (effectiveOv.role === rawP.role) delete effectiveOv.role;
    }
    setProductOverrides(prev => { const next = { ...prev }; if (!isCustom && Object.keys(effectiveOv).length === 0) { delete next[pid]; } else { next[pid] = effectiveOv; } return next; });
    const histEntries = [];
    const iso = new Date().toISOString();
    if (typeof changes.price === "number" && changes.price !== prevPrice) histEntries.push({ date: nowStr(), field: "Preço", oldVal: prevPrice, newVal: changes.price, note, effectiveFrom: iso });
    if (typeof changes.vc === "number" && changes.vc !== prevVc) histEntries.push({ date: nowStr(), field: "Custo Variável", oldVal: prevVc, newVal: changes.vc, note, effectiveFrom: iso });
    if (changes._removed === true) histEntries.push({ date: nowStr(), field: "Status", oldVal: "Ativo", newVal: "Inativo", note, effectiveFrom: iso });
    if (changes._active === true) histEntries.push({ date: nowStr(), field: "Status", oldVal: "Inativo", newVal: "Ativo", note, effectiveFrom: iso });
    if (histEntries.length > 0) setProductHistory(prev => ({ ...prev, [pid]: [...histEntries, ...(prev[pid] || [])] }));
    const prodName = isCustom ? (prevOv.name || `Produto #${pid}`) : rawP.name;
    setUpdateFeedback({ id: pid, msg: `${prodName} atualizado em ${todayStr()}` });
    setTimeout(() => setUpdateFeedback(null), 3500);
  }, [productOverrides, productHistory, schedulePersist]);

  const resetProduct = useCallback((pid) => {
    const rawP = RAW_PRODUCTS.find(p => p.id === pid);
    if (!rawP) return;
    setProductOverrides(prev => { const n = { ...prev }; delete n[pid]; return n; });
    setProductHistory(prev => ({ ...prev, [pid]: [{ date: nowStr(), field: "Reset", oldVal: null, newVal: null, note: "Restaurado" }, ...(prev[pid] || [])] }));
    setUpdateFeedback({ id: pid, msg: `${rawP.name} restaurado ao original` });
    setTimeout(() => setUpdateFeedback(null), 3000);
  }, []);

  const addProduct = useCallback((productData) => {
    const { name, cat, price, vc, role } = productData;
    if (!name?.trim() || !price || price <= 0 || vc === undefined || vc < 0 || !cat) return false;
    const exists = RAW_PRODUCTS.some(p => p.name.toLowerCase() === name.toLowerCase()) || Object.values(productOverrides).some(o => o._custom && o.name?.toLowerCase() === name.toLowerCase());
    if (exists) return false;
    const customCount = Object.values(productOverrides).filter(o => o._custom).length;
    const newId = 100 + customCount + 1;
    setProductOverrides(prev => ({ ...prev, [newId]: { _custom: true, name: name.trim(), cat, price, vc, role: role || "Diferencial", rating: 4.5, nRat: 0, addedAt: new Date().toISOString() } }));
    setUpdateFeedback({ id: newId, msg: `${name.trim()} adicionado ao cardápio` });
    setTimeout(() => setUpdateFeedback(null), 4000);
    return newId;
  }, [productOverrides]);

  const clearAll = useCallback(() => {
    clearPersistedState();
    setCosts(COSTS_DEFAULT);
    setCostLog([{ date: nowStr(), costs: { ...COSTS_DEFAULT }, note: "Reset manual", impact: null }]);
    setCostAlert(null); setProductOverrides({}); setProductHistory({});
    setStrategicParams({ ...STRATEGIC_PARAMS_DEFAULT });
    setUpdateFeedback({ id: null, msg: "Sistema restaurado ao padrão." });
    setTimeout(() => setUpdateFeedback(null), 4000);
  }, []);

  const ctx = useMemo(() => ({
    fin, costs, costLog, costAlert, productOverrides, productHistory, updateFeedback,
    strategicParams, updateCosts, clearCostAlert, updateProduct, resetProduct, clearAll, addProduct,
  }), [fin, costs, costLog, costAlert, productOverrides, productHistory, updateFeedback, strategicParams, updateCosts, clearCostAlert, updateProduct, resetProduct, clearAll, addProduct]);

  return <AppCtx.Provider value={ctx}>{children}</AppCtx.Provider>;
}

));

const PL = ({ children }) => (

const SH = ({ eyebrow, title }) => (

const ChartTip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#121008", border: "1px solid #222", borderRadius: 8, padding: "9px 13px", fontSize: 11 }}>
      {label && <div style={{ color: T.muted, fontSize: 9, marginBottom: 4 }}>{label}</div>}
      {payload.map((p, i) => (
        <div key={i} style={{ color: T.muted, marginBottom: 1 }}>
          {p.name}: <b style={{ color: T.sand }}>{typeof p.value === "number" && Math.abs(p.value) > 100 ? fmtBRL(p.value) : typeof p.value === "number" ? p.value.toFixed(1) : p.value}</b>
        </div>
      ))}
    </div>
  );
};

const InlineEditor = memo(({ value, onSave, small = false }) => {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState("");
  const inputRef = useRef(null);
  const open = () => { setDraft(String(value)); setEditing(true); };
  const cancel = () => setEditing(false);
  const save = () => { const v = parseFloat(draft); if (!isNaN(v) && v >= 0) onSave(v); setEditing(false); };
  const keyDown = e => { if (e.key === "Enter") { e.preventDefault(); save(); } if (e.key === "Escape") { e.preventDefault(); cancel(); } };
  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);

  if (editing) {
    return (
      <div style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
        <span style={{ fontSize: small ? 9 : 10, color: T.muted }}>R$</span>
        <input ref={inputRef} type="number" value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={keyDown} onBlur={save}
          style={{ width: small ? 52 : 64, background: "#0e0c0a", border: `1px solid ${T.accent}88`, borderRadius: 5, padding: small ? "2px 5px" : "3px 7px", fontSize: small ? 11 : 12, color: T.sand, outline: "none", fontFamily: "inherit" }} />
        <button onClick={save} style={{ background: "none", border: "none", cursor: "pointer", color: T.green, fontSize: 12, padding: 0 }}>✓</button>
        <button onClick={cancel} style={{ background: "none", border: "none", cursor: "pointer", color: T.muted, fontSize: 12, padding: 0 }}>✕</button>
      </div>
    );
  }
  return (
    <button onClick={open} style={{ background: "none", border: "none", cursor: "pointer", padding: "2px 4px", borderRadius: 4, fontFamily: "inherit", color: T.sand, fontSize: small ? 11 : 12, fontWeight: 600, fontVariantNumeric: "tabular-nums", borderBottom: `1px dashed ${T.muted}44` }}>
      R$ {safeNum(value).toFixed(2).replace(".", ",")}
    </button>
  );
});

const Alerts = memo(() => {
  const { fin } = useApp();
  const colors = { critical: T.red, warning: T.orange, success: T.green, info: T.blue };
  const labels = { critical: "CRÍTICO", warning: "ATENÇÃO", success: "POSITIVO", info: "INSIGHT" };

  const alerts = useMemo(() => {
    const list = [];
    fin.products.filter(p => p.netMar < 0).forEach(p => {
      list.push({ type: "critical", product: p.name, cat: p.cat, date: "Agora", msg: `Margem líquida negativa (${fmtPct(p.netMar)}). Preço R$${p.price} não cobre custo total estimado de ${fmtBRL2(p.totalCostUnit)}.` });
    });
    detectAnomalies(fin.products).filter(a => a.type === "queda").forEach(a => {
      const p = fin.products.find(x => x.id === a.pid);
      list.push({ type: "warning", product: a.name, cat: p?.cat || "", date: "7 dias", msg: `Queda de ${Math.abs(a.wow).toFixed(0)}% no volume semana a semana. Avaliar visibilidade no iFood e cardápio.` });
    });
    if (fin.netMar30 < 8) list.push({ type: "critical", product: "Margem Geral", cat: "Financeiro", date: "Agora", msg: `Margem líquida em ${fmtPct(fin.netMar30)} — abaixo do mínimo de 8%.` });
    detectAnomalies(fin.products).filter(a => a.type === "crescimento").forEach(a => {
      const p = fin.products.find(x => x.id === a.pid);
      list.push({ type: "success", product: a.name, cat: p?.cat || "", date: "7 dias", msg: `Crescimento de ${a.wow.toFixed(0)}% no volume. Capitalizar com destaque no iFood e stories.` });
    });
    const conc = calcConcentration(fin.products);
    if (conc.top3Pct > 55) list.push({ type: "info", product: "Concentração de Receita", cat: "Estratégico", date: "90 dias", msg: `${conc.top3Pct.toFixed(0)}% da receita em 3 produtos: ${conc.top3.map(p => p.name).join(", ")}.` });
    fin.products.filter(p => p.grossMar > 65 && p.qty90 < fin.avgVol * 0.5).forEach(p => {
      list.push({ type: "info", product: p.name, cat: p.cat, date: "90 dias", msg: `Margem bruta de ${fmtPct(p.grossMar)} com volume baixo (${p.qty90} un). Produto subaproveitado.` });
    });
    return list;
  }, [fin]);

  return (
    <>
      <SH eyebrow="Monitoramento Automático" title="Avisos Inteligentes" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 20 }}>
        {["critical", "warning", "success", "info"].map(t => (
          <div key={t} style={{ background: T.dark, border: `1px solid ${colors[t]}22`, borderRadius: 10, padding: "12px 15px", display: "flex", gap: 10, alignItems: "center" }}>
            <div style={{ fontSize: 9, color: colors[t], fontWeight: 700, letterSpacing: "0.14em", width: 54 }}>{labels[t]}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: T.sand }}>{alerts.filter(a => a.type === t).length}</div>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {alerts.map((a, i) => (
          <div key={i} style={{ background: T.panel, borderLeft: `2.5px solid ${colors[a.type]}`, border: `1px solid ${colors[a.type]}18`, borderRadius: 11, padding: "13px 17px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ display: "flex", gap: 7, alignItems: "center", marginBottom: 6 }}>
                  <Tag color={colors[a.type]} xs>{labels[a.type]}</Tag>
                  <span style={{ fontSize: 12, fontWeight: 700, color: T.sandLight }}>{a.product}</span>
                </div>
                <div style={{ fontSize: 12, color: "#A8A090", lineHeight: 1.6 }}>{a.msg}</div>
              </div>
              <span style={{ fontSize: 9, color: T.subtle, marginLeft: 14, whiteSpace: "nowrap" }}>{a.date}</span>

});

/* ═══════════════════════════════════════
   MATRIZ ESTRATÉGICA
═══════════════════════════════════════ */
const MatrizEstrategica = memo(({ enriched, fin }) => {
  const [hovered, setHovered] = useState(null);
  const [tipPos, setTipPos] = useState({ x: 0, y: 0 });
  const svgRef = useRef(null);
  const W = 720, H = 350;
  const PAD = { top: 24, right: 28, bottom: 48, left: 62 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  const netMars = enriched.map(p => p.netMar);
  const vols = enriched.map(p => p.qty90);
  const nmMin = Math.min(...netMars), nmMax = Math.max(...netMars);
  const vMin = Math.min(...vols), vMax = Math.max(...vols);
  const nmPad = (nmMax - nmMin) * 0.13 || 6;
  const vPad = (vMax - vMin) * 0.13 || 6;
  const nmLo = nmMin - nmPad, nmHi = nmMax + nmPad;
  const vLo = vMin - vPad, vHi = vMax + vPad;
  const cx = nm => PAD.left + ((nm - nmLo) / (nmHi - nmLo)) * plotW;
  const cy = v => PAD.top + (1 - (v - vLo) / (vHi - vLo)) * plotH;
  const refX = cx(fin.avgNetMar);
  const refY = cy(fin.avgVol);
  const nmTicks = Array.from({ length: 6 }, (_, i) => nmLo + (nmHi - nmLo) * i / 5);
  const vTicks = Array.from({ length: 5 }, (_, i) => vLo + (vHi - vLo) * i / 4);

  const onEnter = (p, e) => {
    const rect = svgRef.current?.getBoundingClientRect();
    if (!rect) return;
    const scaleX = W / rect.width, scaleY = H / rect.height;
    setHovered(p);
    setTipPos({ x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY });
  };
  const onMove = (e) => {
    if (!hovered) return;
    const rect = svgRef.current?.getBoundingClientRect();
    if (!rect) return;
    const scaleX = W / rect.width, scaleY = H / rect.height;
    setTipPos({ x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY });
  };
  const onLeave = () => setHovered(null);
  const TW = 190, TH = 130;
  const tipX = tipPos.x + 14 + TW > W ? tipPos.x - TW - 14 : tipPos.x + 14;
  const tipY = tipPos.y - 10 + TH > H ? tipPos.y - TH + 10 : tipPos.y - 10;

  return (
    <Panel style={{ marginBottom: 14 }}>
      <PL>Matriz Estratégica — Margem Líquida × Volume (90 dias)</PL>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 12 }}>
        {[["Estrela", T.accent, "Alta margem · Alto volume"], ["Oportunidade", T.green, "Alta margem · Baixo volume"], ["Popular", T.orange, "Baixa margem · Alto volume"], ["Problema", T.red, "Baixa margem · Baixo volume"]].map(([l, c, d]) => (
          <div key={l} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: c, flexShrink: 0 }} />
            <span style={{ color: T.sandLight, fontWeight: 600 }}>{l}</span>
            <span style={{ color: "#3a3630", fontSize: 9 }}>{d}</span>
          </div>
        ))}
      </div>
      <div style={{ overflowX: "auto" }}>
        <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} style={{ fontFamily: "inherit", display: "block", cursor: "crosshair" }} onMouseMove={onMove} onMouseLeave={onLeave}>
          <rect x={PAD.left} y={PAD.top}  width={refX - PAD.left}    height={refY - PAD.top}      fill={T.green}  fillOpacity={0.025} />
          <rect x={refX}     y={PAD.top}  width={W - PAD.right - refX} height={refY - PAD.top}    fill={T.accent} fillOpacity={0.03} />
          <rect x={PAD.left} y={refY}     width={refX - PAD.left}    height={H - PAD.bottom - refY} fill={T.red}  fillOpacity={0.025} />
          <rect x={refX}     y={refY}     width={W - PAD.right - refX} height={H - PAD.bottom - refY} fill={T.orange} fillOpacity={0.025} />
          {nmTicks.map((v, i) => <line key={i} x1={cx(v)} y1={PAD.top} x2={cx(v)} y2={H - PAD.bottom} stroke="#1a1612" strokeWidth={1} />)}
          {vTicks.map((v, i) => <line key={i} x1={PAD.left} y1={cy(v)} x2={W - PAD.right} y2={cy(v)} stroke="#1a1612" strokeWidth={1} />)}
          <line x1={refX} y1={PAD.top} x2={refX} y2={H - PAD.bottom} stroke="#2e2820" strokeWidth={1.5} strokeDasharray="5 4" />
          <line x1={PAD.left} y1={refY} x2={W - PAD.right} y2={refY} stroke="#2e2820" strokeWidth={1.5} strokeDasharray="5 4" />
          <line x1={PAD.left} y1={H - PAD.bottom} x2={W - PAD.right} y2={H - PAD.bottom} stroke="#2a2420" strokeWidth={1} />
          <line x1={PAD.left} y1={PAD.top} x2={PAD.left} y2={H - PAD.bottom} stroke="#2a2420" strokeWidth={1} />
          {nmTicks.map((v, i) => (
            <g key={i}>
              <line x1={cx(v)} y1={H - PAD.bottom} x2={cx(v)} y2={H - PAD.bottom + 4} stroke="#383028" strokeWidth={1} />
              <text x={cx(v)} y={H - PAD.bottom + 15} textAnchor="middle" fill="#807060" fontSize={9}>{v.toFixed(0)}%</text>
            </g>
          ))}
          {vTicks.map((v, i) => (
            <g key={i}>
              <line x1={PAD.left - 4} y1={cy(v)} x2={PAD.left} y2={cy(v)} stroke="#383028" strokeWidth={1} />
              <text x={PAD.left - 7} y={cy(v) + 4} textAnchor="end" fill="#807060" fontSize={9}>{Math.round(v)}</text>
            </g>
          ))}
          <text x={PAD.left + plotW / 2} y={H - 4} textAnchor="middle" fill="#6A6260" fontSize={9}>Margem Líquida (%)</text>
          <text x={13} y={PAD.top + plotH / 2} textAnchor="middle" fill="#6A6260" fontSize={9} transform={`rotate(-90,13,${PAD.top + plotH / 2})`}>Volume (un. 90d)</text>
          <text x={PAD.left + 8}  y={PAD.top + 14}      fill={T.green}  fontSize={8} fontWeight="700" opacity={0.45}>OPORTUNIDADE</text>
          <text x={refX + 8}      y={PAD.top + 14}      fill={T.accent} fontSize={8} fontWeight="700" opacity={0.45}>ESTRELA</text>
          <text x={PAD.left + 8}  y={H - PAD.bottom - 7} fill={T.red}   fontSize={8} fontWeight="700" opacity={0.45}>PROBLEMA</text>
          <text x={refX + 8}      y={H - PAD.bottom - 7} fill={T.orange} fontSize={8} fontWeight="700" opacity={0.45}>POPULAR</text>
          {enriched.map(p => {
            const x = cx(p.netMar), y = cy(p.qty90);
            const q = p.quadrant;
            const isHov = hovered?.id === p.id;
            const shortName = p.name.length > 14 ? p.name.slice(0, 13) + "…" : p.name;
            return (
              <g key={p.id} onMouseEnter={e => onEnter(p, e)} style={{ cursor: "pointer" }}>
                {isHov && <circle cx={x} cy={y} r={26} fill={q.color} fillOpacity={0.12} stroke={q.color} strokeWidth={0.5} />}
                <circle cx={x} cy={y} r={18} fill={q.color} fillOpacity={isHov ? 0.22 : 0.09} stroke={q.color} strokeWidth={isHov ? 2 : 1.4} />
                <text x={x} y={y + 4} textAnchor="middle" fill={q.color} fontSize={isHov ? 8 : 7} fontWeight="700">{shortName}</text>
              </g>
            );
          })}
          {hovered && (() => {
            const p = hovered, q = p.quadrant, tx = tipX, ty = tipY;
            return (
              <g>
                <rect x={tx + 2} y={ty + 2} width={TW} height={TH} rx={8} fill="#000" fillOpacity={0.35} />
                <rect x={tx} y={ty} width={TW} height={TH} rx={8} fill="#141008" stroke={q.color} strokeWidth={1.5} strokeOpacity={0.6} />
                <rect x={tx} y={ty} width={4} height={TH} rx={2} fill={q.color} fillOpacity={0.8} />
                <text x={tx + 14} y={ty + 18} fill={T.sandLight} fontSize={11} fontWeight="800">{p.name.length > 22 ? p.name.slice(0, 21) + "…" : p.name}</text>
                <line x1={tx + 8} y1={ty + 28} x2={tx + TW - 8} y2={ty + 28} stroke="#2a2420" strokeWidth={1} />
                {[
                  ["Margem Bruta", fmtPct(p.grossMar)],
                  ["Margem Líquida", fmtPct(p.netMar)],
                  ["Volume 90d", `${p.qty90} un`],
                  ["Receita 90d", fmtBRL(p.rev90)],
                  ["Avaliação", `${p.rating}★`],
                  ["WoW", `${p.wow >= 0 ? "+" : ""}${Number(p.wow).toFixed(0)}%`],
                ].map(([label, val], i) => (
                  <g key={label}>
                    <text x={tx + 14} y={ty + 42 + i * 14} fill="#5e584f" fontSize={9}>{label}</text>
                    <text x={tx + TW - 10} y={ty + 42 + i * 14} textAnchor="end" fill={
                      label === "Margem Líquida" ? (p.netMar < 0 ? T.red : p.netMar > 12 ? T.green : T.accent) :
                      label === "WoW" ? (p.wow >= 0 ? T.green : T.red) : T.sand
                    } fontSize={9} fontWeight="700">{val}</text>
                  </g>
                ))}
              </g>
            );
          })()}
        </svg>
      </div>
    </Panel>
  );
});

/* ═══════════════════════════════════════
   PIE CHART
═══════════════════════════════════════ */
const PIE_COLORS = { aluguel: "#E07820", energia: "#58B868", agua: "#5090C8", gas: "#D08040", folha: "#D45050", taxas: "#9070C0", marketing: "#40A8A8", outros: "#808070" };

const CostPieChart = memo(({ costs, totalFixed }) => {
  const [hovered, setHovered] = useState(null);
  const SIZE = 160, R = 62, CX = SIZE / 2, CY = SIZE / 2, IR = 38;
  const entries = Object.entries(costs).filter(([, v]) => v > 0);
  const total = totalFixed || entries.reduce((a, [, v]) => a + v, 0) || 1;
  let cumAngle = -Math.PI / 2;
  const slices = entries.map(([k, v]) => {
    const pct2 = v / total, angle = pct2 * 2 * Math.PI, start = cumAngle, end = cumAngle + angle;
    cumAngle = end;
    const x1 = CX + R * Math.cos(start), y1 = CY + R * Math.sin(start);
    const x2 = CX + R * Math.cos(end), y2 = CY + R * Math.sin(end);
    const xi1 = CX + IR * Math.cos(start), yi1 = CY + IR * Math.sin(start);
    const xi2 = CX + IR * Math.cos(end), yi2 = CY + IR * Math.sin(end);
    const large = angle > Math.PI ? 1 : 0;
    const path = `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${IR} ${IR} 0 ${large} 0 ${xi1} ${yi1} Z`;
    return { key: k, path, pct: pct2, v, color: PIE_COLORS[k] || T.muted };
  });
  const hoveredSlice = hovered ? slices.find(s => s.key === hovered) : null;

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
      <div style={{ position: "relative", flexShrink: 0 }}>
        <style>{`.pie-s{transition:opacity 0.18s,transform 0.18s;transform-origin:center;}`}</style>
        <svg width={SIZE} height={SIZE} style={{ overflow: "visible" }}>
          {slices.map(s => (
            <path key={s.key} className="pie-s" d={s.path} fill={s.color} opacity={hovered && hovered !== s.key ? 0.35 : 0.85} stroke={T.bg} strokeWidth={2}
              style={{ cursor: "pointer", transform: hovered === s.key ? "scale(1.04)" : "scale(1)" }}
              onMouseEnter={() => setHovered(s.key)} onMouseLeave={() => setHovered(null)} />
          ))}
          <text x={CX} y={CY - 6} textAnchor="middle" fill={T.sandLight} fontSize={11} fontWeight={800} fontFamily="Georgia,serif">{hoveredSlice ? `${(hoveredSlice.pct * 100).toFixed(0)}%` : `${(total / 1000).toFixed(0)}k`}</text>
          <text x={CX} y={CY + 10} textAnchor="middle" fill={T.muted} fontSize={7}>{hoveredSlice ? COST_LABELS[hoveredSlice.key]?.substring(0, 8) : "TOTAL"}</text>
        </svg>
      </div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
        {slices.map(s => (
          <div key={s.key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", opacity: hovered && hovered !== s.key ? 0.4 : 1, transition: "opacity 0.15s", padding: "2px 0" }}
            onMouseEnter={() => setHovered(s.key)} onMouseLeave={() => setHovered(null)}>
            <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color, flexShrink: 0 }} />
              <span style={{ fontSize: 10, color: hovered === s.key ? T.sandLight : "#A8A090" }}>{COST_LABELS[s.key]}</span>
            </div>
            <div>
              <span style={{ fontSize: 10, color: T.sand, fontWeight: hovered === s.key ? 700 : 500, fontVariantNumeric: "tabular-nums" }}>{fmtBRL(s.v)}</span>
              <span style={{ fontSize: 9, color: s.color, marginLeft: 5 }}>{(s.pct * 100).toFixed(0)}%</span>
            </div>
          </div>
        ))}
        <div style={{ borderTop: `1px solid ${T.edge}`, paddingTop: 6, display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontSize: 10, color: T.muted }}>Total mensal</span>
          <span style={{ fontSize: 13, fontWeight: 800, color: T.sand }}>{fmtBRL(total)}</span>
        </div>
      </div>
    </div>
  );
});

                  <div key={l} style={{ background: "#121008", borderRadius: 7, padding: "7px 10px" }}>

                    <div style={{ fontSize: 12, color: T.sand, fontWeight: 600 }}>{v}</div>

              if (!ps.length) return null;
              const rev = ps.reduce((a, p) => a + p.rev90, 0);
              const gm = ps.reduce((a, p) => a + p.grossMar, 0) / ps.length;
              const nm = ps.reduce((a, p) => a + p.netMar, 0) / ps.length;
              const vol = ps.reduce((a, p) => a + p.qty90, 0);
              return (
                <tr key={cat} style={{ borderBottom: "1px solid #111", background: i % 2 === 0 ? "transparent" : "#0d0b09" }}>

const Copilot = memo(() => {
  const { fin, costs } = useApp();
  const [mode, setMode] = useState("interno");
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [messages, setMessages] = useState([{
    role: "assistant", mode: "interno",
    text: "Copiloto ativo — dados da Pizzaria Suburbanos carregados. 28 produtos monitorados, 12 meses de histórico. Faça sua pergunta sobre cardápio, margens, custos ou estratégia.",
  }]);

  const abortRef = useRef(null);
  const loadingRef = useRef(false);
  const bottomRef = useRef(null);
  const finRef = useRef(fin);
  const modeRef = useRef(mode);

  useEffect(() => { finRef.current = fin; }, [fin]);
  useEffect(() => { modeRef.current = mode; }, [mode]);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  const MODES = {
    interno:   { label: "Diagnóstico Interno", icon: "📁", color: T.accent },
    simulacao: { label: "Simulação",            icon: "◎",  color: T.green  },
    mercado:   { label: "Mercado",              icon: "📊", color: T.blue   },
  };

  const SUGGESTIONS = [
    { text: "Estou lucrando pouco — por quê?",         mode: "interno"   },
    { text: "Qual pizza devo remover do cardápio?",     mode: "interno"   },
    { text: "Como melhorar minha margem líquida?",      mode: "interno"   },
    { text: "E se aumentar 10% o preço da Calabresa?",  mode: "simulacao" },
    { text: "Tendências em pizzas especiais em SP?",    mode: "mercado"   },
  ];

  const buildContext = () => {
    const f = finRef.current || {};
    const prods = Array.isArray(f.products) ? f.products : [];
    return `PIZZARIA SUBURBANOS — DADOS INTERNOS
Faturamento 30d: ${fmtBRL(f.totalRev30)} | Lucro bruto: ${fmtBRL(f.totalGP30)} | Custos fixos: ${fmtBRL(f.totalFixed)}
Lucro líquido: ${fmtBRL(f.netProfit30)} | Margem líquida: ${fmtPct(f.netMar30)} | Margem bruta: ${fmtPct(f.grossMar30)}
Ticket médio: ${fmtBRL2(f.avgTicketVal)} | Ponto equilíbrio: ${fmtBRL(f.breakeven)}

PRODUTOS (${prods.length}):
${prods.map(p => `${p.name} | ${p.cat} | R$${p.price} | M.B:${fmtPct(p.grossMar)} | M.L:${fmtPct(p.netMar)} | ${p.qty90}un | WoW:${p.wow >= 0 ? "+" : ""}${Number(p.wow).toFixed(0)}%`).join("\n")}`;
  };

  const send = async (textOverride, modeOverride) => {
    const msgText = (textOverride != null ? textOverride : input).trim().slice(0, 2000);
    const msgMode = modeOverride || modeRef.current || "interno";
    if (!msgText || loadingRef.current) return;
    if (abortRef.current) { try { abortRef.current.abort(); } catch (_) {} }
    const controller = new AbortController();
    abortRef.current = controller;
    setInput("");
    setMessages(prev => [...prev, { role: "user", text: msgText }]);
    setLoading(true);
    loadingRef.current = true;

    const system = `Você é o Copiloto da Pizzaria Suburbanos, SP. Responda em português, de forma direta e objetiva, baseado nos dados internos fornecidos. Nunca invente números. Se não souber, diga. Máx 200 palavras.`;
    const context = buildContext();

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        signal: controller.signal,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 600,
          system: `${system}\n\n${context}`,
          messages: [{ role: "user", content: msgText }],
        }),
      });
      if (!resp.ok) throw new Error("api_" + resp.status);
      const data = await resp.json();
      const txt = (data?.content || []).filter(b => b?.type === "text").map(b => b.text).join("").trim();
      setMessages(prev => [...prev, { role: "assistant", mode: msgMode, text: txt || "Sem resposta." }]);
    } catch (err) {
      if (err?.name === "AbortError") { setLoading(false); loadingRef.current = false; return; }
      setMessages(prev => [...prev, { role: "assistant", mode: msgMode, text: "Falha temporária no serviço de IA. Tente novamente em alguns segundos." }]);
    }
    setLoading(false);
    loadingRef.current = false;
  };

  return (
    <>
      <SH eyebrow="Inteligência Estratégica com IA" title="Copiloto Suburbanos" />
      <div style={{ display: "flex", gap: 6, marginBottom: 18, paddingBottom: 14, borderBottom: T.border }}>
        {Object.entries(MODES).map(([k, { label, icon, color }]) => (
          <button key={k} onClick={() => setMode(k)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 15px", borderRadius: 8, border: `1px solid ${mode === k ? color + "44" : T.edge}`, background: mode === k ? color + "0d" : "transparent", color: mode === k ? color : T.muted, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            <span>{icon}</span><span>{label}</span>
          </button>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 240px", gap: 16, alignItems: "start" }}>
        <div>
          <div style={{ minHeight: 400, maxHeight: 500, overflowY: "auto", marginBottom: 12 }}>
            {messages.map((msg, i) => (
              msg.role === "user" ? (
                <div key={i} style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
                  <div style={{ maxWidth: "72%", padding: "9px 14px", fontSize: 12, lineHeight: 1.6, borderRadius: "11px 11px 3px 11px", background: "#161208", border: T.border, color: "#8a8078" }}>{msg.text}</div>
                </div>
              ) : (
                <div key={i} style={{ display: "flex", gap: 10, marginBottom: 18, alignItems: "flex-start" }}>
                  <div style={{ width: 26, height: 26, borderRadius: "50%", background: T.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: T.black, fontWeight: 900, flexShrink: 0, fontFamily: "Georgia,serif" }}>S</div>
                  <div style={{ flex: 1, maxWidth: "90%" }}>
                    <div style={{ fontSize: 13, color: "#b0a898", lineHeight: 1.75, whiteSpace: "pre-wrap" }}>{msg.text}</div>
                  </div>
                </div>
              )
            ))}
            {loading && (
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14 }}>
                <div style={{ width: 26, height: 26, borderRadius: "50%", background: T.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: T.black, fontWeight: 900, fontFamily: "Georgia,serif" }}>S</div>
                <div style={{ display: "flex", gap: 4 }}>
                  <style>{`@keyframes dot{0%,100%{opacity:.2}50%{opacity:.9}}`}</style>
                  {[0, 1, 2].map(i => <div key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: T.muted, animation: `dot 1.2s infinite`, animationDelay: `${i * 0.22}s` }} />)}
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          <div style={{ display: "flex", gap: 8, background: T.panel, border: T.border, borderRadius: 11, padding: "3px 3px 3px 15px", alignItems: "center" }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
              placeholder="Ex: qual pizza tem melhor margem? …" disabled={loading}
              style={{ flex: 1, background: "transparent", border: "none", fontSize: 12, color: T.sand, outline: "none", fontFamily: "inherit", padding: "9px 0", opacity: loading ? 0.5 : 1 }} />
            <button onClick={() => send()} disabled={loading || !input.trim()} style={{ background: loading || !input.trim() ? "#1c1812" : T.sand, color: loading || !input.trim() ? T.muted : T.black, border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 11, fontWeight: 800, cursor: loading || !input.trim() ? "not-allowed" : "pointer", fontFamily: "inherit", flexShrink: 0 }}>
              {loading ? "…" : "Enviar"}
            </button>
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <Panel>
            <PL>Perguntas Rápidas</PL>
            {SUGGESTIONS.map((s, i) => (
              <button key={i} onClick={() => { if (!loading) { setMode(s.mode); send(s.text, s.mode); } }} disabled={loading}
                style={{ display: "flex", gap: 7, padding: "7px 9px", borderRadius: 7, background: "#0d0b09", border: T.border, cursor: loading ? "not-allowed" : "pointer", fontFamily: "inherit", textAlign: "left", width: "100%", marginBottom: 6, opacity: loading ? 0.45 : 1 }}>
                <span style={{ fontSize: 9, color: T.muted, flexShrink: 0, marginTop: 1 }}>{MODES[s.mode].icon}</span>
                <span style={{ fontSize: 10, color: "#807870", lineHeight: 1.45 }}>{s.text}</span>
              </button>
            ))}
          </Panel>
          <Panel>
            <PL>Status</PL>
            {[
              { l: "Margem líquida", v: fmtPct(fin.netMar30), c: fin.netMar30 > 12 ? T.green : fin.netMar30 > 5 ? T.accent : T.red },
              { l: "Lucro líquido", v: fmtBRL(fin.netProfit30), c: fin.netProfit30 > 0 ? T.green : T.red },
              { l: "Custos fixos", v: fmtBRL(fin.totalFixed) },
              { l: "Produtos", v: String(fin.products.length), c: T.sand },
            ].map(({ l, v, c }) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", marginBottom: 7, fontSize: 11 }}>
                <span style={{ color: T.muted }}>{l}</span>
                <span style={{ color: c || T.sand, fontWeight: 600 }}>{v}</span>
              </div>
            ))}
          </Panel>
        </div>
      </div>
    </>
  );
});

          <div style={{ marginTop: 14 }}>
            <div style={{ fontSize: 9, color: T.muted, letterSpacing: "0.12em", marginBottom: 8 }}>RESET DO SISTEMA</div>
            {!resetConfirm ? (
              <button onClick={handleReset} style={{ background: "transparent", border: `1px solid ${T.edge}`, borderRadius: 8, padding: "9px 16px", fontSize: 11, color: T.muted, cursor: "pointer", fontFamily: "inherit", width: "100%" }}>

                  <button onClick={() => setResetConfirm(false)} style={{ background: "transparent", border: `1px solid ${T.edge}`, borderRadius: 7, padding: "8px 0", fontSize: 11, color: T.muted, cursor: "pointer", fontFamily: "inherit" }}>✕ Cancelar</button>

});

          )}
        </div>
        <nav style={{ flex: 1, padding: "7px 5px", display: "flex", flexDirection: "column", gap: 2 }}>
          {NAV.map(({ id, icon, label }) => {
            const active = tab === id;
            const badge = id === "alerts" && critCount > 0;
            return (
              <button key={id} onClick={() => setTab(id)} title={label} style={{ display: "flex", alignItems: "center", gap: 9, padding: "8px 11px", borderRadius: 7, border: "none", cursor: "pointer", fontFamily: "inherit", background: active ? T.accent + "1a" : "transparent", color: active ? T.sandLight : T.muted, transition: "all 0.12s", justifyContent: collapsed ? "center" : "flex-start", position: "relative" }}>
                <span style={{ fontSize: 13, flexShrink: 0, color: active ? T.accent : "#464440" }}>{icon}</span>
                {!collapsed && <span style={{ fontSize: 11, fontWeight: active ? 700 : 400, whiteSpace: "nowrap" }}>{label}</span>}
                {badge && <span style={{ position: "absolute", top: 6, right: collapsed ? 6 : 8, width: 6, height: 6, borderRadius: "50%", background: T.red }} />}
                {active && !collapsed && <div style={{ position: "absolute", right: 0, top: "50%", transform: "translateY(-50%)", width: 2, height: 13, background: T.accent, borderRadius: 1 }} />}
              </button>
            );
          })}
        </nav>
        <div style={{ padding: "7px 5px", borderTop: T.border }}>
          <button onClick={() => setCollapsed(c => !c)} style={{ width: "100%", padding: "7px", borderRadius: 7, border: "none", background: "transparent", cursor: "pointer", color: T.subtle, fontSize: 11, fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: collapsed ? "center" : "flex-start", gap: 5 }}>
            <span style={{ fontSize: 11 }}>{collapsed ? "→" : "←"}</span>
            {!collapsed && <span style={{ fontSize: 9, letterSpacing: "0.08em" }}>Recolher</span>}
          </button>
        </div>
      </aside>
      <main style={{ flex: 1, overflowY: "auto", padding: "34px 38px", minWidth: 0 }}>
        {tab === "dashboard"  && <Dashboard  period={period} setPeriod={setPeriod} />}
        {tab === "alerts"     && <Alerts />}
        {tab === "menu"       && <MenuAnalysis />}
        {tab === "simulation" && <Simulation />}
        {tab === "costs"      && <Costs />}
        {tab === "report"     && <MonthlyReport />}
        {tab === "copilot"    && <Copilot />}
        {tab === "settings"   && <Settings />}
      </main>
    </div>
  );
}

function SuburbanosApp() {
  return (
    <AppProvider>
      <AppRoot />
    </AppProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SuburbanosApp />);
</script>
</body>
</html>
